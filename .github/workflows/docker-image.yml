name: Build & Push Docker Image

# 1ma fork: builds the LibreChat image with our Linear/shadcn redesign
# and pushes to GHCR. Tagged by branch (latest, redesign-linear-shadcn, etc.)
# and by short SHA so 1ma-lab can pin a specific build.

on:
  push:
    branches:
      - main
      - 'redesign/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trigger Railway deployment
        if: github.ref == 'refs/heads/main'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          set -euo pipefail
          API=https://backboard.railway.com/graphql/v2

          LOOKUP=$(jq -cn --arg id "$RAILWAY_PROJECT_ID" '{
            query: "query($id: String!) { project(id: $id) { services { edges { node { id name } } } environments { edges { node { id name } } } } }",
            variables: { id: $id }
          }')

          RESP=$(curl -sfX POST "$API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$LOOKUP")

          SERVICE_ID=$(echo "$RESP" | jq -r '.data.project.services.edges[] | select(.node.name=="1ma-lab") | .node.id')
          ENV_ID=$(echo "$RESP" | jq -r '.data.project.environments.edges[] | select(.node.name=="production") | .node.id')

          if [ -z "$SERVICE_ID" ] || [ -z "$ENV_ID" ] || [ "$SERVICE_ID" = "null" ] || [ "$ENV_ID" = "null" ]; then
            echo "Could not resolve Railway service/environment IDs. Response:"
            echo "$RESP"
            exit 1
          fi

          REDEPLOY=$(jq -cn --arg sid "$SERVICE_ID" --arg eid "$ENV_ID" '{
            query: "mutation($serviceId: String!, $environmentId: String!) { serviceInstanceRedeploy(serviceId: $serviceId, environmentId: $environmentId) }",
            variables: { serviceId: $sid, environmentId: $eid }
          }')

          curl -sfX POST "$API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$REDEPLOY"

          echo
          echo "Triggered Railway redeploy for service 1ma-lab (sha-$(echo '${{ github.sha }}' | cut -c1-7))"
